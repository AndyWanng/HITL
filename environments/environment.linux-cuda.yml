name: hemorrhage-hitl-linux
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pyyaml
  - nibabel
  - scipy
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - --extra-index-url https://pypi.org/simple
      - torch==2.9.1
      - torchvision==0.24.1
      - torchaudio==2.9.1
      - -e ..
